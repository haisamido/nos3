metadata:
  OU: ssmo
  ENVIRO: dev
  TENANT: ssmo
  CONTEXT: missions-exp # -exp must exist to match remote AWS EKS cluster in appdat

defaults:
  spec:    
    HEALTHCHECK_PORT: &HEALTHCHECK_PORT
      60000
    PATHS: &PATHS
      BASE_DIR: &BASE_DIR
        /builds/nos3
      SIM_BIN: &SIM_BIN
        /builds/nos3/sims/build/bin
      SIMULATOR_BIN: &SIMULATOR_BIN
        /builds/nos3/sims/build/bin/nos3-single-simulator
      LOG_CONFIG: &LOG_CONFIG
        /builds/nos3/sims/build/bin/sim_log_config.xml
      CFG_FILE: &CFG_FILE
        /ssmo-dev/git/appdat.jsc.nasa.gov/ssmo/missions/ssmo/dev/nos3/missions/nos301/spacecraft/sc1/services/nos3/nos3-simulator.xml
    container: &container
      PATHS: 
        << : *PATHS
      resources: &resources
        limits: &limits
          memory: "128Mi"
          cpu: "100m"
        requests: &requests
          memory: "128Mi"
          cpu: "100m"
    nodes: &nodes
      min_size: 1
      max_size: 1
      desired_size: 1
      instance_types: m6i.xlarge
      nodeSelector: ""
      imagePullPolicy: IfNotPresent
      components: &hw_components
        camsim:
          name: camsim
          container: 
            << : *container
        generic-css-sim:
          name: css
          container: 
            << : *container
        generic-eps-sim:
          name: eps
          container: 
            << : *container
        generic-fss-sim:
          name: fss
          container: 
            << : *container
        gps:
          name: gps
          container: 
            << : *container
        generic-imu-sim:
          name: imu
          container: 
            << : *container 
        generic-mag-sim:
          name: mag
          container: 
            << : *container
        generic-reactionwheel-sim0: 
          name: rw0
          container: 
            << : *container 
        generic-reactionwheel-sim1: 
          name: rw1
          container: 
            << : *container
        generic-reactionwheel-sim2: 
          name: rw2
          container: 
            << : *container
        generic-radio-sim:
          name: radio
          container: 
            << : *container
        generic-star-tracker-sim:
          name: start-tracker
          container: 
            << : *container
        generic-torquer-sim:
          name: torquer
          container: 
            << : *container
        generic-thruster-sim:
          name: thruster
          container: 
            << : *container
        time:
          name: time
          container: 
            << : *container
        stdio-terminal:
          name: stdio-terminal
          container: 
            << : *container
        udp-terminal:
          name: udp-terminal
          container: 
            << : *container
      # nos_engine: & nos_engine
      #   container: 
      #     << : *container
      # truth42: &truth42
      #   container: 
      #     << : *container
      # flight_dynamics: &flight_dynamics
      #   fortytwo: &fortytwo
      #     container: 
      #       << : *container
      # encryption: &encryption
      #   cryptolib: 
      #     container: 
      #       << : *container

missions:
  - nos3-m01:
      enabled: true
      spacecraft:
        - sc1:
            enabled: true
            components: 
              << : *hw_components
        - sc2:
            enabled: false
            components: 
              << : *hw_components
              # camsim:
              #   container:
              #     resources:
              #       limits:
              #         memory: "128Mi"
              #         cpu: "125m"
              #       requests:
              #         memory: "128Mi"
              #         cpu: "125m"
  - nos3-m02:
      enabled: false
      spacecraft:
        - sc1:
            enabled: true
            components: 
              << : *hw_components
